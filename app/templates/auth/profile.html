{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Profile</h1>

<div class="mb-4 text-slate-300">Logged in as: <span class="text-white">{{ current_user.email }}</span></div>

<form method="post" class="space-y-3 max-w-md">
  {{ form.csrf_token }}
  <div>
    <label class="block mb-1">Display name</label>
    {{ form.display_name(class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-800") }}
  </div>
  <button class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700">Save</button>
</form>

<div class="mt-6">
  <a class="text-indigo-300 hover:text-indigo-200" href="{{ url_for('auth.change_password') }}">Change password →</a>
</div>
{% endblock %}
