{% extends "base.html" %}
{% block title %}Data Tools{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-8">
  <h1 class="text-2xl font-semibold text-white">Data Tools</h1>
  <a
    class="flex items-center bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-md text-sm font-medium transition-colors"
    href="{{ url_for('transactions.index') }}"
  >
    Back to Transactions
  </a>
</div>

<div class="bg-slate-900 border border-slate-800 rounded-xl p-5 mb-8">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-medium text-white">Export CSV</h2>
  </div>
  <p class="text-slate-400 text-sm mb-4">ส่งออกรายการธุรกรรมทั้งหมดเป็นไฟล์ CSV</p>
  <a
    class="inline-flex items-center bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-md text-sm font-medium transition-colors"
    href="{{ url_for('transactions.export_csv') }}"
  >
    Download CSV
  </a>
</div>

<form
  class="bg-slate-900 border border-slate-800 rounded-xl p-5 mb-8 flex flex-wrap gap-4 items-end"
  method="post"
  action="{{ url_for('transactions.import_csv') }}"
  enctype="multipart/form-data"
>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="flex flex-col space-y-1.5 flex-1 min-w-[220px]">
    <label class="text-xs text-slate-400">Import CSV</label>
    <input
      type="file"
      name="csv_file"
      accept=".csv,text/csv"
      class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded-md p-2.5 outline-none"
      required
    >
  </div>
  <button class="bg-indigo-600 hover:bg-indigo-500 text-slate-100 px-6 py-2.5 rounded-md text-sm transition-colors">
    Upload
  </button>
</form>

<p class="text-slate-500 text-sm">
  รูปแบบไฟล์ที่รองรับ: <code>tx_date,type,amount,category,note,tags</code> (คอลัมน์ <code>tags</code> เป็น optional)
</p>
{% endblock %}
